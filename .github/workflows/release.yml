name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# GitHub Actions: opt into Node 24 for JS-based actions (see GH changelog 2025-09-19).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            id: linux
          - os: windows-latest
            id: windows
          - os: macos-latest
            id: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Linux dependencies (GTK + WebKit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Ubuntu 24.10+ often drops webkit2gtk-4.0; Wails uses 4.1 with build tag webkit2_41
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (Linux)
        if: matrix.id == 'linux'
        run: wails build -clean -tags webkit2_41

      - name: Build (Windows)
        if: matrix.id == 'windows'
        run: wails build -clean

      - name: Build (macOS universal)
        if: matrix.id == 'macos'
        run: wails build -clean -platform darwin/universal

      - name: Package Linux
        if: matrix.id == 'linux'
        run: cd build/bin && tar czvf ../../localbeam-linux-amd64.tar.gz LocalBeam

      - name: Package Windows
        if: matrix.id == 'windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/LocalBeam.exe -DestinationPath localbeam-windows-amd64.zip

      - name: Package macOS
        if: matrix.id == 'macos'
        run: cd build/bin && zip -ry ../../localbeam-macos-universal.zip LocalBeam.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: localbeam-${{ matrix.id }}
          path: localbeam-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: localbeam-*
          merge-multiple: true

      - name: Flatten release assets
        run: |
          mkdir -p release-assets
          find dist -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec cp -v {} release-assets/ \;
          ls -la release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LocalBeam ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
